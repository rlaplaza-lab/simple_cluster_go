name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check
        run: |
          ruff check .

      - name: Run ruff format (check only)
        run: |
          ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check SQLite JSON1 extension
        run: |
          python - <<'PY'
          import sqlite3, sys
          conn = sqlite3.connect(":memory:")
          try:
              cur = conn.cursor()
              cur.execute("SELECT json_extract('{\"a\": 42}', '$.a')")
              res = cur.fetchone()
              if res is None or res[0] != 42:
                  print("SQLite JSON1 returned unexpected result:", res)
                  sys.exit(1)
          except sqlite3.OperationalError as e:
              print("SQLite JSON1 extension required but not available:", e)
              sys.exit(1)
          finally:
              conn.close()
          PY

      - name: Run fast tests
        if: github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        run: |
          pytest tests/ -m "not slow" -v --cov=scgo --cov-report=xml --cov-report=term

      - name: Run all tests (including slow)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          pytest tests/ -v --cov=scgo --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false