[pytest]
# Tests enabled: pytest will discover test files matching the pattern below.
python_files = test_*.py
addopts = -q
filterwarnings =
    # PyTorch 2.x: MACE/torch_sim still exercise torch.jit serialization paths.
    ignore:.*torch\.jit\.save.*:DeprecationWarning
    ignore:.*torch\.jit\.script.*:DeprecationWarning
    ignore:.*torch\.jit\.load.*:DeprecationWarning
    # torch_sim 0.5.x: nvalchemiops import alias (upstream).
    ignore:.*nvalchemiops\.neighborlist.*:DeprecationWarning
    # Optional: dev envs may import both MACE and fairchem; SCGO warns once.
    ignore:Both the MACE stack and fairchem-core.*:UserWarning
    # Py3.12 multiprocessing warning noise in xdist/parallel DB tests.
    ignore:This process .* is multi-threaded, use of fork\(\) may lead to deadlocks in the child\.:DeprecationWarning
    # ASE EMT: numerical edge case during GA collisions (intentional in test).
    ignore:divide by zero encountered in divide:RuntimeWarning:ase\.calculators\.emt
    ignore:invalid value encountered in multiply:RuntimeWarning:ase\.calculators\.emt
    # ASE NEB / Atoms: numerical edge cases when atoms coincide (intentional in tests).
    ignore:divide by zero encountered in divide:RuntimeWarning:ase\.mep\.neb
    ignore:invalid value encountered in multiply:RuntimeWarning:ase\.mep\.neb
    ignore:invalid value encountered in divide:RuntimeWarning:ase\.atoms
    # e3nn: noisy torch.load weights_only warning when env var is set (dependency noise).
    ignore:Environment variable TORCH_FORCE_NO_WEIGHTS_ONLY_LOAD detected.*:UserWarning:e3nn\.o3\._wigner
    # TorchSim relaxer: tests intentionally hit step limits; warnings are not actionable.
    ignore:All systems have reached the maximum number of steps.*:UserWarning:scgo\.calculators\.torchsim_helpers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (full workflow tests)
    requires_cuda: marks tests that require CUDA/GPU support
    force_mace_gpu: marks tests that force MACE to use GPU (skips if CUDA unavailable)
    force_njobs_parallel: marks tests that force initialization to use n_jobs=-2

# Common test selection patterns:
#
# Fast tests only (exclude slow tests):
#   pytest tests/ -m "not slow"
#
# Integration tests:
#   pytest tests/ -m integration
#
# Unit tests only (exclude integration and slow):
#   pytest tests/ -m "not (slow or integration)"
#
# All non-GPU tests:
#   pytest tests/ -m "not requires_cuda"
#
# All tests:
#   pytest tests/
