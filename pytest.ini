[pytest]
# Tests enabled: pytest will discover test files matching the pattern below.
python_files = test_*.py
addopts = -q
filterwarnings =
    # PyTorch 2.x: MACE/torch_sim still exercise torch.jit serialization paths.
    ignore:.*torch\.jit\.save.*:DeprecationWarning
    ignore:.*torch\.jit\.script.*:DeprecationWarning
    # torch_sim 0.5.x: nvalchemiops import alias (upstream).
    ignore:.*nvalchemiops\.neighborlist.*:DeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (full workflow tests)
    requires_cuda: marks tests that require CUDA/GPU support
    requires_torch: marks tests that require PyTorch
    force_mace_gpu: marks tests that force MACE to use GPU (skips if CUDA unavailable)
    force_njobs_parallel: marks tests that force initialization to use n_jobs=-2
    benchmark: marks tests as performance benchmarks
    regression: marks tests for specific bug regressions

# Common test selection patterns:
#
# Fast tests only (exclude slow tests):
#   pytest tests/ -m "not slow"
#
# Integration tests:
#   pytest tests/ -m integration
#
# Unit tests only (exclude integration and slow):
#   pytest tests/ -m "not (slow or integration)"
#
# All non-GPU tests:
#   pytest tests/ -m "not requires_cuda"
#
# All tests:
#   pytest tests/
